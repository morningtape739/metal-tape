<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>THE METAL TAPE — TOUR WIRE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet"/>
  <script>
    window.MT = {
      WORKER: 'https://metal-tape-api.themorningtape26.workers.dev',
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --bg2: #0d0d0d;
      --bg3: #111;
      --red: #8b0000;
      --red-bright: #c0392b;
      --red-dim: #3a0000;
      --orange: #f7931a;
      --text: #e0d8d0;
      --text-muted: #555;
      --text-dim: #333;
      --border: #1a1a1a;
      --border2: #222;
      --mono: 'JetBrains Mono', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none; z-index: 9999;
    }

    /* ── MASTHEAD ── */
    .masthead {
      background: linear-gradient(180deg, #1a0000 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--red-dim);
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: relative; overflow: visible; gap: 12px; flex-wrap: wrap;
    }
    .masthead-left { display: flex; align-items: center; gap: 14px; }
    .masthead-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }

    .logo { font-size: clamp(16px, 3vw, 22px); font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--text); }
    .logo span { color: var(--red-bright); }
    .tagline { font-size: 8px; letter-spacing: 3px; color: var(--text-dim); margin-top: 3px; }

    .nav-btn {
      padding: 6px 12px; font-family: var(--mono);
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; border: 1px solid var(--border2);
      background: transparent; color: var(--text-muted);
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s;
    }
    .nav-btn:hover { border-color: var(--red-bright); color: var(--red-bright); }

    .live-badge { display: flex; align-items: center; gap: 5px; font-size: 9px; letter-spacing: 3px; color: var(--text-muted); }
    .live-dot { color: var(--red-bright); animation: pulse 1.5s infinite; font-size: 8px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── BTC BUTTON — fixed visibility ── */
    .btc-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--orange);
      color: var(--orange);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      transition: all 0.15s; flex-shrink: 0;
      animation: btcGlow 3s infinite;
    }
    @keyframes btcGlow { 0%,100%{box-shadow:0 0 4px rgba(247,147,26,0.3)} 50%{box-shadow:0 0 10px rgba(247,147,26,0.7)} }
    .btc-btn:hover, .btc-btn.active { background: var(--orange); color: #000; border-color: var(--orange); animation: none; }

    .btc-panel {
      position: absolute; top: calc(100% + 8px); right: 0;
      width: 300px; background: #0e0e0e;
      border: 1px solid #3a2000; padding: 16px;
      z-index: 500; box-shadow: 0 4px 24px rgba(0,0,0,0.9);
    }
    .btc-panel-label { font-size: 12px; letter-spacing: 3px; color: var(--orange); text-transform: uppercase; margin-bottom: 4px; font-weight: 800; }
    .btc-panel-sub { font-size: 8px; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 12px; }
    .btc-address-wrap {
      font-size: 10px; color: #aaa; background: #1a1a1a;
      border: 1px solid var(--border2); padding: 10px;
      word-break: break-all; margin-bottom: 10px;
      letter-spacing: 0.5px; line-height: 1.5; user-select: all;
      cursor: pointer; transition: border-color 0.15s;
    }
    .btc-address-wrap:hover { border-color: var(--orange); color: var(--orange); }
    .btc-copy-btn {
      width: 100%; padding: 7px; background: transparent;
      border: 1px solid #3a2000; color: var(--orange);
      font-family: var(--mono); font-size: 9px; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; transition: all 0.15s;
    }
    .btc-copy-btn:hover { background: var(--orange); color: #000; border-color: var(--orange); }
    .btc-copy-btn.copied { background: #1a3a1a; border-color: #2a5a2a; color: #4caf50; }
    .btc-hint { font-size: 8px; color: var(--text-dim); letter-spacing: 1px; margin-top: 8px; text-align: center; }

    /* ── BARBED WIRE ── */
    .barbed-wire { width: 100%; height: 24px; overflow: hidden; flex-shrink: 0; }
    .barbed-wire svg { width: 100%; height: 100%; }

    /* ── TICKER ── */
    .ticker {
      background: var(--red-dim); border-bottom: 1px solid var(--red);
      height: 32px; overflow: hidden; position: relative;
    }
    .ticker-track {
      display: flex; align-items: center; height: 100%;
      animation: tickerScroll 60s linear infinite; white-space: nowrap;
    }
    @keyframes tickerScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    .ticker-item { font-size: 9px; letter-spacing: 2px; color: #cc4444; padding: 0 24px; text-transform: uppercase; }
    .ticker-cross { color: var(--red); margin-left: 24px; }

    /* ── SEARCH BAR ── */
    .search-section { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 20px; }
    .search-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
    .search-input-wrap {
      flex: 1; min-width: 200px;
      display: flex; align-items: center;
      border: 1px solid var(--border2); background: #111;
      padding: 0 12px; gap: 8px;
    }
    .search-input-wrap:focus-within { border-color: var(--red-bright); }
    .search-input {
      flex: 1; background: transparent; border: none;
      color: var(--text); font-family: var(--mono);
      font-size: 11px; padding: 8px 0; outline: none;
    }
    .search-input::placeholder { color: var(--text-dim); }
    .search-btn {
      padding: 8px 16px; font-family: var(--mono);
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; border: 1px solid var(--red-dim);
      background: transparent; color: var(--red-bright);
      transition: all 0.15s; white-space: nowrap;
    }
    .search-btn:hover:not(:disabled) { background: var(--red-bright); color: #fff; border-color: var(--red-bright); }
    .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .search-btn.loading { animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .location-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .location-label { font-size: 9px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; }
    .location-input {
      background: #111; border: 1px solid var(--border2);
      color: var(--text); font-family: var(--mono); font-size: 11px;
      padding: 6px 10px; outline: none; width: 160px;
    }
    .location-input:focus { border-color: var(--red-bright); }
    .radius-btn {
      padding: 4px 10px; font-family: var(--mono);
      font-size: 9px; letter-spacing: 1px;
      cursor: pointer; border: 1px solid var(--border2);
      background: transparent; color: var(--text-muted); transition: all 0.12s;
    }
    .radius-btn.active { border-color: var(--red-bright); color: var(--text); background: var(--red-dim); }
    .radius-btn:hover:not(.active) { border-color: #333; color: var(--text-muted); }
    .watchlist-pill {
      padding: 4px 10px; font-family: var(--mono);
      font-size: 9px; letter-spacing: 1px;
      cursor: pointer; border: 1px solid var(--border2);
      background: transparent; color: var(--text-muted);
      transition: all 0.12s; display: flex; align-items: center; gap: 5px;
    }
    .watchlist-pill.active { border-color: #c0392b; color: #e0d8d0; background: #2a0000; }
    .watchlist-pill:hover:not(.active) { border-color: #333; }

    /* ── STATUS BAR ── */
    .status-bar {
      padding: 7px 20px; font-size: 9px; letter-spacing: 2px;
      color: var(--text-dim); border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
    }
    .status-bar.loading { color: var(--red); }

    /* ── MONTH HEADER ── */
    .month-header {
      padding: 8px 20px; font-size: 9px; letter-spacing: 4px;
      color: var(--red-bright); text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      background: #0c0c0c; position: sticky; top: 0; z-index: 10;
    }

    /* ── SHOW ROW ── */
    .show-row {
      display: flex; align-items: stretch;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s; cursor: pointer;
    }
    .show-row:hover { background: #0e0e0e; }
    .show-row.watched { background: rgba(139,0,0,0.05); border-left: 2px solid var(--red); }

    .show-date {
      min-width: 64px; padding: 14px 10px;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center; flex-shrink: 0;
    }
    .show-date-month { font-size: 8px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
    .show-date-day { font-size: 20px; font-weight: 800; color: var(--red-bright); line-height: 1.1; }
    .show-date-year { font-size: 8px; color: var(--text-dim); letter-spacing: 1px; }

    .show-body { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
    .show-artist { font-size: clamp(11px, 1.8vw, 14px); font-weight: 700; color: var(--text); line-height: 1.3; }
    .show-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .show-venue { font-size: 11px; color: var(--text-muted); }
    .show-location { font-size: 10px; color: var(--text-dim); }
    .show-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; }
    .show-tag { font-size: 7px; letter-spacing: 1px; text-transform: uppercase; padding: 1px 5px; border: 1px solid var(--border2); color: var(--text-dim); }
    .show-tag.watched-tag { border-color: var(--red-dim); color: #cc4444; }

    .show-actions {
      display: flex; flex-direction: column;
      align-items: flex-end; justify-content: center;
      padding: 10px 14px; gap: 6px; flex-shrink: 0;
    }
    .ticket-btn {
      padding: 6px 12px; background: transparent;
      border: 1px solid var(--red-dim); color: var(--red-bright);
      font-family: var(--mono); font-size: 8px; letter-spacing: 2px;
      text-transform: uppercase; text-decoration: none;
      transition: all 0.12s; white-space: nowrap; display: block; cursor: pointer;
    }
    .ticket-btn:hover { background: var(--red-bright); color: #fff; border-color: var(--red-bright); }
    .dice-btn {
      padding: 4px 10px; background: transparent;
      border: 1px solid #1a1a1a; color: #444;
      font-family: var(--mono); font-size: 7px; letter-spacing: 1px;
      text-transform: uppercase; text-decoration: none;
      transition: all 0.12s; white-space: nowrap; display: block;
    }
    .dice-btn:hover { border-color: #333; color: #888; }

    /* ── EMPTY / ERROR ── */
    .empty-state {
      text-align: center; padding: 60px 24px;
      font-size: 11px; letter-spacing: 3px;
      color: var(--text-dim); text-transform: uppercase; line-height: 2;
    }
    .empty-sub { font-size: 9px; color: var(--text-dim); margin-top: 10px; letter-spacing: 1px; text-transform: none; }

    .loading-dot { display: inline-block; width: 4px; height: 4px; background: var(--red-bright); border-radius: 50%; margin: 0 2px; animation: dotPulse 1.2s infinite; }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      padding: 12px 20px; font-size: 9px; letter-spacing: 2px;
      color: var(--text-dim); border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
      background: var(--bg2);
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .show-row { flex-wrap: wrap; }
      .show-actions { flex-direction: row; padding: 8px 12px; width: 100%; justify-content: flex-start; border-top: 1px solid var(--border); }
      .search-row { flex-direction: column; align-items: stretch; }
      .search-input-wrap { min-width: unset; }
      .location-row { flex-wrap: wrap; }
      .btc-panel { width: 260px; right: -10px; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
  'use strict';

  const WORKER = (window.MT && window.MT.WORKER) || '';
  const WATCHLIST_KEY = 'metalTape_watchlist_v1';
  const BTC_ADDRESS = 'bc1qej3uqlv202lxyz7zph8du9mh25rzyqtxs8zsvj';

  const state = {
    bands: [],
    bandInput: '',
    location: '',
    radius: 'nationwide',
    useWatchlist: false,
    watchlist: loadWatchlist(),
    shows: [],
    loading: false,
    error: null,
    btcOpen: false,
    btcCopied: false,
    searched: false,
  };

  const RADII = ['25mi', '50mi', '100mi', '250mi', 'nationwide'];

  function loadWatchlist() {
    try { const s = localStorage.getItem(WATCHLIST_KEY); return s ? JSON.parse(s) : []; } catch(e) { return []; }
  }

  function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function formatDate(dtStr) {
    const d = new Date(dtStr);
    if (isNaN(d)) return { month: '??', day: '??', year: '????' };
    return {
      month: d.toLocaleString('default', { month: 'short' }).toUpperCase(),
      day: d.getDate(),
      year: d.getFullYear(),
    };
  }

  function groupByMonth(shows) {
    const groups = {};
    shows.forEach(s => {
      const d = new Date(s.datetime);
      const key = isNaN(d) ? 'TBD' : d.toLocaleString('default', { month: 'long', year: 'numeric' });
      if (!groups[key]) groups[key] = [];
      groups[key].push(s);
    });
    return groups;
  }

  function isWatchedArtist(artistName) {
    if (!artistName) return false;
    const u = artistName.toUpperCase();
    return state.watchlist.some(b => u.includes(b) || b.includes(u));
  }

  // ── API — routed through Worker to avoid CORS ──
  async function fetchBandShows(bandName) {
    if (!WORKER) return [];
    try {
      const res = await fetch(`${WORKER}/api/bandsintown?artist=${encodeURIComponent(bandName)}`);
      if (!res.ok) return [];
      const data = await res.json();
      if (!Array.isArray(data)) return [];
      return data.map(ev => ({
        ...ev,
        _artist: bandName,
        _watched: isWatchedArtist(bandName),
      }));
    } catch(e) {
      return [];
    }
  }

  async function runSearch() {
    const bandsToSearch = state.useWatchlist
      ? state.watchlist
      : state.bandInput.trim()
        ? [state.bandInput.trim()]
        : [];

    if (bandsToSearch.length === 0) {
      state.error = 'Enter a band name or enable watchlist mode.';
      render(); return;
    }

    state.loading = true;
    state.error = null;
    state.shows = [];
    state.searched = true;
    render();

    try {
      // Fetch all bands in parallel, chunked at 20 to be respectful
      let allShows = [];
      for (let i = 0; i < bandsToSearch.length; i += 20) {
        const chunk = bandsToSearch.slice(i, i + 20);
        const results = await Promise.all(chunk.map(fetchBandShows));
        results.forEach(r => allShows = allShows.concat(r));
      }

      // Filter by location if set and not nationwide
      if (state.location.trim() && state.radius !== 'nationwide') {
        const locLower = state.location.toLowerCase().trim();
        allShows = allShows.filter(s => {
          const city = (s.venue?.city || '').toLowerCase();
          const region = (s.venue?.region || '').toLowerCase();
          return city.includes(locLower) || region.includes(locLower) ||
                 locLower.includes(city) || locLower.includes(region);
        });
      }

      // Sort by date
      allShows.sort((a, b) => new Date(a.datetime) - new Date(b.datetime));

      // Dedupe by event ID
      const seen = new Set();
      allShows = allShows.filter(s => {
        if (seen.has(s.id)) return false;
        seen.add(s.id); return true;
      });

      state.shows = allShows;
    } catch(err) {
      state.error = 'Wire severed. Try again.';
      console.error(err);
    } finally {
      state.loading = false;
      render();
    }
  }

  // ── ICONS ──
  const ICONS = {
    btc: `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M23.638 14.904c-1.602 6.43-8.113 10.34-14.542 8.736C2.67 22.05-1.244 15.525.362 9.105 1.962 2.67 8.475-1.243 14.9.358c6.43 1.605 10.342 8.115 8.738 14.546zM15.73 7.364c-.93-.36-1.944-.594-2.954-.713l.53-2.11-1.295-.324-.516 2.054a42.4 42.4 0 0 0-1.036-.248l.52-2.07-1.294-.323-.53 2.108c-.285-.065-.566-.13-.838-.198l.002-.007-1.786-.446-.344 1.384s.956.218.936.232c.522.13.617.476.601.75l-.602 2.41c.036.01.082.023.133.044l-.135-.034-.844 3.376c-.064.158-.226.396-.59.306.013.018-.936-.234-.936-.234l-.64 1.483 1.686.42c.314.08.62.162.923.24l-.536 2.15 1.293.322.53-2.112c.347.094.683.181 1.012.263l-.528 2.1 1.294.324.536-2.144c2.21.418 3.873.25 4.573-1.75.563-1.607-.028-2.534-1.19-3.138.847-.196 1.485-.754 1.655-1.907zm-2.963 4.153c-.4 1.607-3.107.738-3.984.52l.71-2.847c.878.22 3.694.654 3.274 2.327zm.401-4.176c-.365 1.463-2.62.72-3.352.538l.644-2.579c.732.183 3.088.523 2.708 2.04z"/></svg>`,
    search: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
    heart: `<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
  };

  function tplDots() {
    return '<span><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></span>';
  }

  function tplBarbedWire() {
    const id = 'w' + Math.random().toString(36).slice(2,7);
    return `<div class="barbed-wire"><svg viewBox="0 0 800 24" preserveAspectRatio="none">
      <defs><pattern id="${id}" x="0" y="0" width="40" height="24" patternUnits="userSpaceOnUse">
        <line x1="0" y1="12" x2="40" y2="12" stroke="#3a0000" stroke-width="1.5"/>
        <line x1="20" y1="4" x2="14" y2="20" stroke="#3a0000" stroke-width="1.5"/>
        <line x1="20" y1="4" x2="26" y2="20" stroke="#3a0000" stroke-width="1.5"/>
        <line x1="14" y1="4" x2="20" y2="20" stroke="#3a0000" stroke-width="1.5"/>
        <line x1="26" y1="4" x2="20" y2="20" stroke="#3a0000" stroke-width="1.5"/>
      </pattern></defs>
      <rect width="800" height="24" fill="url(#${id})"/>
    </svg></div>`;
  }

  function tplTicker() {
    const phrases = ['TOUR DATES','LIVE SHOWS','ON THE ROAD','METAL TOUR WIRE','UPCOMING SHOWS','LIVE METAL','TOUR DATES','LIVE SHOWS','ON THE ROAD','METAL TOUR WIRE','UPCOMING SHOWS','LIVE METAL'];
    return `<div class="ticker"><div class="ticker-track">${phrases.map(p=>`<span class="ticker-item">${p}<span class="ticker-cross">✛</span></span>`).join('')}</div></div>`;
  }

  function tplMasthead() {
    return `<div class="masthead">
      <div class="masthead-left">
        <div>
          <div class="logo">The Metal Tape <span>// TOUR WIRE</span></div>
          <div class="tagline">⛧ LIVE SHOW TRACKER ⛧ POWERED BY BANDSINTOWN ⛧</div>
        </div>
      </div>
      <div class="masthead-right">
        <a href="index.html" class="nav-btn">◂ NEWS FEED</a>
        <div class="live-badge"><span class="live-dot">●</span> LIVE</div>
        <div style="position:relative;">
          <button class="btc-btn ${state.btcOpen?'active':''}" onclick="Tour.toggleBtc(event)" title="Support with Bitcoin">
            ${ICONS.btc} BTC
          </button>
          ${state.btcOpen ? `<div class="btc-panel" onclick="event.stopPropagation()">
            <div class="btc-panel-label">⛧ Support The Wire ⛧</div>
            <div class="btc-panel-sub">BITCOIN DONATION ADDRESS</div>
            <div class="btc-address-wrap" onclick="Tour.copyBtc(event)">${BTC_ADDRESS}</div>
            <button class="btc-copy-btn ${state.btcCopied?'copied':''}" onclick="Tour.copyBtc(event)">
              ${state.btcCopied ? '✓ COPIED' : 'COPY ADDRESS'}
            </button>
            <div class="btc-hint">${state.btcCopied ? '⛧ COPIED TO CLIPBOARD ⛧' : '⛧ TAP ADDRESS TO COPY ⛧'}</div>
          </div>` : ''}
        </div>
      </div>
    </div>`;
  }

  function tplSearch() {
    const wl = state.watchlist.length;
    return `<div class="search-section">
      <div class="search-row">
        <div class="search-input-wrap">
          ${ICONS.search}
          <input class="search-input" id="band-input" type="text"
            placeholder="BAND NAME — e.g. Whitechapel, Lorna Shore, Archspire"
            value="${escapeHtml(state.bandInput)}"
            oninput="Tour.updateBandInput(this.value)"
            onkeydown="if(event.key==='Enter')Tour.runSearch()"/>
        </div>
        <button class="search-btn ${state.loading?'loading':''}" onclick="Tour.runSearch()" ${state.loading?'disabled':''}>
          ${state.loading ? 'SEARCHING...' : '⛧ FIND SHOWS'}
        </button>
      </div>
      <div class="location-row">
        <span class="location-label">▸ LOCATION:</span>
        <input class="location-input" type="text" placeholder="City or State (optional)"
          value="${escapeHtml(state.location)}"
          oninput="Tour.updateLocation(this.value)"/>
        <span class="location-label" style="margin-left:4px;">▸ RADIUS:</span>
        ${RADII.map(r=>`<button class="radius-btn ${state.radius===r?'active':''}" onclick="Tour.setRadius('${r}')">${r.toUpperCase()}</button>`).join('')}
        ${wl > 0 ? `
        <button class="watchlist-pill ${state.useWatchlist?'active':''}" onclick="Tour.toggleWatchlist()">
          ${ICONS.heart} WATCHLIST [${wl}]${state.useWatchlist?' ✓':''}
        </button>` : ''}
      </div>
    </div>`;
  }

  function tplShowRow(show) {
    const dt = formatDate(show.datetime);
    const venue = show.venue || {};
    const artist = show._artist || (show.lineup && show.lineup[0]) || 'UNKNOWN';
    const isWatched = show._watched || isWatchedArtist(artist);
    const ticketUrl = show.offers && show.offers.length > 0 ? show.offers[0].url : null;
    const diceUrl = `https://dice.fm/search?q=${encodeURIComponent(artist)}`;
    const locationStr = [venue.city, venue.region, venue.country === 'United States' ? '' : venue.country].filter(Boolean).join(', ');

    return `<div class="show-row ${isWatched?'watched':''}" onclick="${ticketUrl?`window.open('${escapeHtml(ticketUrl)}','_blank','noopener,noreferrer')`:'void(0)'}">
      <div class="show-date">
        <div class="show-date-month">${dt.month||'TBD'}</div>
        <div class="show-date-day">${dt.day||'?'}</div>
        <div class="show-date-year">${dt.year||''}</div>
      </div>
      <div class="show-body">
        <div class="show-artist">${escapeHtml(artist)}${show.lineup && show.lineup.length > 1 ? ' <span style="color:#555;font-weight:400;font-size:10px;">+ '+escapeHtml(show.lineup.slice(1).join(', '))+'</span>' : ''}</div>
        <div class="show-meta">
          <span class="show-venue">${escapeHtml(venue.name||'')}</span>
          <span class="show-location">${escapeHtml(locationStr)}</span>
        </div>
        <div class="show-tags">
          ${isWatched ? '<span class="show-tag watched-tag">⛧ WATCHED</span>' : ''}
          ${venue.country && venue.country !== 'United States' ? `<span class="show-tag">${escapeHtml(venue.country)}</span>` : ''}
        </div>
      </div>
      <div class="show-actions" onclick="event.stopPropagation()">
        ${ticketUrl
          ? `<a href="${escapeHtml(ticketUrl)}" target="_blank" rel="noopener noreferrer" class="ticket-btn">TICKETS →</a>`
          : `<span class="ticket-btn" style="opacity:0.3;cursor:default;">NO LINK</span>`}
        <a href="${escapeHtml(diceUrl)}" target="_blank" rel="noopener noreferrer" class="dice-btn">SEARCH DICE ↗</a>
      </div>
    </div>`;
  }

  function tplFeed() {
    if (state.loading) {
      return `<div class="empty-state">⛧ TAPPING THE WIRE ${tplDots()}<div class="empty-sub">Searching ${state.useWatchlist ? state.watchlist.length + ' watchlist bands' : 'Bandsintown'}...</div></div>`;
    }
    if (state.error) {
      return `<div class="empty-state">⛧ ${escapeHtml(state.error)} ⛧</div>`;
    }
    if (!state.searched) {
      const wl = state.watchlist.length;
      return `<div class="empty-state">
        ⛧ ENTER A BAND OR USE YOUR WATCHLIST ⛧
        <div class="empty-sub">${wl > 0 ? `You have ${wl} band${wl!==1?'s':''} on your Metal Tape watchlist — click WATCHLIST above to load their shows` : 'Search any band to see upcoming tour dates worldwide'}</div>
      </div>`;
    }
    if (state.shows.length === 0) {
      return `<div class="empty-state">⛧ NO SHOWS FOUND ⛧<div class="empty-sub">Try a different band, remove the location filter, or check back later</div></div>`;
    }
    const grouped = groupByMonth(state.shows);
    return Object.entries(grouped).map(([month, shows]) => `
      <div class="month-header">── ${month} &nbsp; (${shows.length} show${shows.length!==1?'s':''})</div>
      ${shows.map(tplShowRow).join('')}
    `).join('');
  }

  function tplStatus() {
    if (state.loading) return `<div class="status-bar loading">⛧ SEARCHING ${tplDots()}</div>`;
    if (!state.searched) return `<div class="status-bar">⛧ TOUR WIRE READY ⛧</div>`;
    return `<div class="status-bar">
      <span>SHOWING ${state.shows.length} SHOW${state.shows.length!==1?'S':''} ${state.location ? '· ' + state.location.toUpperCase() : '· WORLDWIDE'}</span>
      <span style="color:#3a3a3a;">BANDSINTOWN · DICE FALLBACK AVAILABLE</span>
    </div>`;
  }

  function tplBottom() {
    return `<div class="bottom-bar">
      <div>⛧ TOUR WIRE · BANDSINTOWN · ${state.watchlist.length} BANDS WATCHED ⛧</div>
      <div style="color:#2a2a2a;">THE METAL TAPE</div>
    </div>`;
  }

  const Tour = {
    updateBandInput(v) { state.bandInput = v; },
    updateLocation(v) { state.location = v; },
    setRadius(r) { state.radius = r; render(); },
    toggleWatchlist() { state.useWatchlist = !state.useWatchlist; render(); },
    runSearch() { runSearch(); },
    toggleBtc(e) {
      if (e) { e.stopPropagation(); e.preventDefault(); }
      state.btcOpen = !state.btcOpen; state.btcCopied = false; render();
    },
    copyBtc(e) {
      if (e) { e.stopPropagation(); e.preventDefault(); }
      navigator.clipboard.writeText(BTC_ADDRESS).then(() => {
        state.btcCopied = true; render();
        setTimeout(() => { state.btcCopied = false; render(); }, 2500);
      });
    },
  };
  window.Tour = Tour;

  document.addEventListener('click', function(e) {
    if (state.btcOpen && !e.target.closest('.btc-panel') && !e.target.closest('.btc-btn')) {
      state.btcOpen = false; render();
    }
  });

  function render() {
    const app = document.getElementById('app');
    if (!app) return;
    app.innerHTML =
      tplMasthead() +
      tplBarbedWire() +
      tplTicker() +
      tplBarbedWire() +
      tplSearch() +
      tplStatus() +
      tplFeed() +
      tplBarbedWire() +
      tplBottom();
  }

  function init() {
    render();
    if (state.watchlist.length > 0) {
      state.useWatchlist = true;
      render();
      runSearch();
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
